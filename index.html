    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0f3d1f" />
    <script>
      // Prevent "Cannot set property fetch of #<Window> which has only a getter"
      // by intercepting any attempts to overwrite window.fetch
      (function() {
        if (typeof window !== 'undefined' && window.fetch) {
          var originalFetch = window.fetch;
          try {
            Object.defineProperty(window, 'fetch', {
              get: function() { return originalFetch; },
              set: function(val) { console.warn('Ignored attempt to overwrite window.fetch'); },
              configurable: true
            });
          } catch(e) {}
        }
      })();
    </script>
